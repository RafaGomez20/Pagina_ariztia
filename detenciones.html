<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detenciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" href="Logo Ariztia.png" />
  <link rel="stylesheet" href="./global.css">
  <style>
    body {
      background-color: #f3f3f3;
    }


    #loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #3498db;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .chart-box {
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      padding: 15px;
      min-height: 250px;
    }

    .filter-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }


    #limpiar-filtros {
      color: #fff;
      background-color: rgb(165, 13, 13);
      border: none;
      padding: 6px 10px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="top-bar text-rig">
    <span id="welcome-message"></span>  
    <button id="logout-button" class="btn btn-danger btn-sm" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="container-fluid mb-3">
    <div class="row">
      <div class="col-12 header">
        <img src="Logo Ariztia.png" alt="Logo Ariztia" style="width: 100px;" />
      </div>
      <div class="col-12 text-center">
        <a href="index.html" class="btn btn-secondary mt-2">Inicio</a>
        <a class="btn btn-danger disabled mt-2">Detenciones</a>
        <a href="contacto_directo.html" class="btn btn-secondary mt-2">Contacto directo</a>
        <a href="no_conformidades.html" class="btn btn-secondary mt-2">No conformidades</a>
        <a href="consumo_agua.html" class=" mt-2 btn btn-secondary">Manejo de agua</a>
      </div>
    </div>
  </div>


  <!-- Contenido principal -->
  <div class="container-fluid main-content">
    <div class="row g-4">

      <!-- Panel lateral -->
      <div class="col-md-3 col-lg-2">
        <div class="d-flex flex-column gap-3">
          <div class="filter-card">

            <div class="mb-2">
              <label for="filtro-anio" class="form-label">Año</label>
              <select id="filtro-anio" class="form-select form-select-sm"></select>
            </div>

            <div class="mb-2">
              <label for="filtro-mes" class="form-label">Mes</label>
              <select id="filtro-mes" class="form-select form-select-sm" disabled></select>
            </div>

            <div class="mb-2">
              <label for="filtro-dia" class="form-label">Día</label>
              <select id="filtro-dia" class="form-select form-select-sm" disabled></select>
            </div>
          </div>

          <div class="d-grid">
            <button id="limpiar-filtros">Limpiar filtros</button>
          </div>
        </div>
      </div>

      <!-- Contenedor de gráficos -->
      <div class="col-md-9 col-lg-10">
        <div class="card p-4">
          <div class="row g-3 align-items-end mb-3">
            <div class="col-md-4 col-lg-3">
              <label for="filtro-area" class="form-label">Área</label>
              <select id="filtro-area" class="form-select form-select-sm"></select>
            </div>
            <div class="col-md-4 col-lg-3">
              <label for="filtro-seccion" class="form-label">Sección</label>
              <select id="filtro-seccion" class="form-select form-select-sm"></select>
            </div>
            <div class="col-md-4 col-lg-3">
              <label for="filtro-tpm" class="form-label">TPM</label>
              <select id="filtro-tpm" class="form-select form-select-sm"></select>
            </div>
            <div class="col-md-4 col-lg-3">
              <label for="filtro-detencion" class="form-label">Detención</label>
              <select id="filtro-detencion" class="form-select form-select-sm"></select>
            </div>
          </div>

          <hr>

          <div id="container" class="row g-3 mt-3">
            <div class="col-md-6">
              <div class="chart-box" id="grafico1"></div>
            </div>
            <div class="col-md-6">
              <div class="chart-box" id="grafico2"></div>
            </div>
            <div class="col-md-6">
              <div class="chart-box" id="grafico3"></div>
            </div>
            <div class="col-md-6">
              <div class="chart-box" id="grafico4"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div id="tabla-detalles-container" class="container-fluid my-4"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // verificacion de sesion al cargar la pagina
    // si no hay usuario en sessionStorage, redirigir a login.html
    if (!sessionStorage.getItem('user')) {
    window.location.href = 'login.html';
        // no continuar con el resto del script si no esta logeado
        throw new Error('No autorizado - redirigiendo a login');
    }

  //funciones de sesion
  function cerrarSesion() {
    try {
      sessionStorage.clear();
    } catch (error) {
      console.error('Error al limpiar sesion:', error);
    }
  }
  function logout() {
    cerrarSesion();
    window.location.replace('login.html');
  }
  window.addEventListener('load', function() {
    const user = sessionStorage.getItem('user');
    const welcome = document.getElementById('welcome-message');
    welcome.textContent = (user?.USER || user?.email || user);
  });
        
  document.addEventListener("DOMContentLoaded", () => {
    const user = sessionStorage.getItem("user");

    if (!user) {
      //si no hay sesion iniciada devuelve al login.js
      window.location.href = "login.html";
      return;
    }

    //esto es para el cerrar sesion
    document.getElementById("logout-button").addEventListener("click", () => {
      sessionStorage.removeItem("user");
      window.location.href = "login.html";
    });
  });
</script>
    <script src="frontend_mu.js"></script>
</body>
</html>
